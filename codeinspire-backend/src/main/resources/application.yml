server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: codeinspire-backend

  datasource:
    url: jdbc:mysql://localhost:3306/codeinspire?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.codeinspire.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:CodeInspireSecretKey2024ForJWTTokenGenerationAndValidationMustBeLongEnough}
  expiration: 86400000

ai:
  providers:
    mimo:
      api-key: ${MIMO_API_KEY:}
      base-url: https://api.mimo.com/v1
      model: mimo-mini
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat
    zhipu:
      api-key: ${ZHIPU_API_KEY:}
      base-url: https://open.bigmodel.cn/api/paas/v4
      model: glm-4
    qwen:
      api-key: ${QWEN_API_KEY:}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-plus

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  collection-name: codeinspire-knowledge-base

logging:
  level:
    com.codeinspire: debug
    org.springframework.security: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
